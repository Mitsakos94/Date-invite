<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1;
            width: 85%;
            max-width: 400px;
        }

        h1 {
            color: #d63384;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 0.5em 1.2em;
            font-size: 1.2rem;
            border: none;
            border-radius: 0.5em;
            cursor: pointer;
            transition: all 0.2s;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #45a049;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: relative;
            z-index: 10;
            transition: 0.1s ease;
        }

        .success-message {
            display: none;
            font-size: 2rem;
            color: #d63384;
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1 id="question">Will you go on a date with me? ❤️</h1>
        <div class="buttons" id="btnContainer">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
        <div id="success" class="success-message">Yay! See you then! 🥰</div>
    </div>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const btnContainer = document.getElementById('btnContainer');
        const successMsg = document.getElementById('success');
        const bgMusic = document.getElementById('bgMusic');

        let yesFontSize = 1.2;

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            yesFontSize += 0.4;
            yesBtn.style.fontSize = `${yesFontSize}rem`;
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents the actual click/tap from occurring
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            btnContainer.style.display = 'none';
            successMsg.style.display = 'block';
            bgMusic.play();
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d63384', '#ff69b4', '#ffc0cb']
            });
        });
    </script>
</body>
</html>
