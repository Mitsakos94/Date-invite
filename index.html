<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #ffeef2 0%, #ffdde1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.2);
            z-index: 1;
            width: 85%;
            max-width: 450px;
            transition: all 0.5s ease-in-out;
        }

        h1 {
            color: #d63384;
            margin-bottom: 1.5rem;
            font-size: 2.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        h2 {
            color: #d63384;
            font-size: 1.4rem;
            margin-top: 0;
        }

        #question {
            transition: all 0.3s ease;
        }

        .floating-card {
            animation: floatCard 3s ease-in-out infinite;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 0.8em 2em;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1) translateY(-3px);
            background-color: #45a049;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: relative;
            z-index: 10;
            transition: 0.1s ease;
        }

        #noBtn.moving {
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.4);
            transform: scale(0.9);
        }

        #finalizeBtn {
            background-color: #d63384;
            color: white;
            margin-top: 1.5rem;
            width: 100%;
        }

        .success-message {
            display: none;
            font-size: 2.5rem;
            color: #d63384;
            animation: heartBeat 1.5s infinite;
        }

        .options-container {
            display: none;
            text-align: left;
            animation: fadeIn 0.8s ease-out;
        }

        .option-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #555;
        }

        select, input[type="date"] {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 2rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="card floating-card" id="mainCard">
        <div id="step1">
            <h1 id="question">Will you go on a date with me? ❤️</h1>
            <div class="buttons" id="btnContainer">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="step2" class="options-container">
            <h2>Yay! Let's plan it... 🥰</h2>
            
            <div class="option-group">
                <label>What should we do?</label>
                <select id="activity">
                    <option value="Dinner">Romantic Dinner 🍷</option>
                    <option value="Movie">Movie Night 🍿</option>
                    <option value="Walk">Sunset Walk 🌅</option>
                    <option value="Coffee">Coffee & Books ☕</option>
                </select>
            </div>

            <div class="option-group">
                <label>Cuisine preference?</label>
                <select id="food">
                    <option value="Italian">Italian 🍝</option>
                    <option value="Sushi">Sushi 🍣</option>
                    <option value="Mexican">Tacos 🌮</option>
                    <option value="Dessert">Just Dessert 🍦</option>
                </select>
            </div>

            <div class="option-group">
                <label>What time of day? 🕒</label>
                <select id="timeOfDay">
                    <option value="Afternoon">Sunny Afternoon ☀️</option>
                    <option value="Evening">Golden Hour 🌅</option>
                    <option value="Night">Under the Stars ✨</option>
                </select>
            </div>

            <div class="option-group">
                <label>Desired vibe? ✨</label>
                <select id="vibe">
                    <option value="Cozy">Cozy & Chill 🧸</option>
                    <option value="Fancy">Fancy & Elegant 🥂</option>
                    <option value="Adventurous">Fun & Adventurous 🎡</option>
                </select>
            </div>

            <div class="option-group">
                <label>When works best?</label>
                <input type="date" id="datePicker">
            </div>

            <button id="finalizeBtn">Confirm Date ✨</button>
        </div>

        <div id="success" class="success-message">It's a date! 💖</div>
    </div>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    
    <!-- External dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // UI Elements
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const finalizeBtn = document.getElementById('finalizeBtn');
        const successMsg = document.getElementById('success');
        const bgMusic = document.getElementById('bgMusic');
        const questionHead = document.getElementById('question');

        let yesFontSize = 1.2;
        let noClickCount = 0;

        // Initialize Date Picker to tomorrow
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('datePicker').value = tomorrow.toISOString().split('T')[0];

        // Three.js Background Animation
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Custom Heart Geometry
        const heartShape = new THREE.Shape();
        heartShape.moveTo( 0, 0 );
        heartShape.bezierCurveTo( 0, 0, -1, -5, -10, -5 );
        heartShape.bezierCurveTo( -22, -5, -22, 10,-22, 10 );
        heartShape.bezierCurveTo( -22, 18, -16, 28, 0, 35 );
        heartShape.bezierCurveTo( 16, 28, 22, 18, 22, 10 );
        heartShape.bezierCurveTo( 22, 10, 22, -5, 10, -5 );
        heartShape.bezierCurveTo( 5, -5, 0, 0, 0, 0 );

        const heartGeometry = new THREE.ShapeGeometry(heartShape);
        heartGeometry.center();

        const hearts = [];
        for(let i = 0; i < 80; i++) {
            const material = new THREE.MeshBasicMaterial({ 
                color: new THREE.Color(`hsl(${Math.random() * 20 + 330}, 100%, ${Math.random() * 20 + 60}%)`),
                transparent: true,
                opacity: Math.random() * 0.4 + 0.2
            });
            const heart = new THREE.Mesh(heartGeometry, material);
            heart.position.set(
                (Math.random() - 0.5) * 15,
                (Math.random() - 0.5) * 15,
                (Math.random() - 0.5) * 15
            );
            const s = Math.random() * 0.01 + 0.005;
            heart.scale.set(s, -s, s); // Flip Y to stand upright
            heart.userData = { 
                speed: Math.random() * 0.02 + 0.01,
                sway: Math.random() * 0.01
            };
            scene.add(heart);
            hearts.push(heart);
        }

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            hearts.forEach(h => {
                h.position.y += h.userData.speed;
                h.position.x += Math.sin(Date.now() * 0.002) * h.userData.sway;
                if (h.position.y > 8) h.position.y = -8;
                h.rotation.z += 0.01;
                h.rotation.y += 0.01;
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const noPhrases = [
            "No", "Are you sure?", "Really?", "Think again!", 
            "Pwease? 🥺", "But why?", "Click Yes!", "You can't catch me!"
        ];

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            noBtn.classList.add('moving');

            yesFontSize += 0.4;
            yesBtn.style.fontSize = `${yesFontSize}rem`;
            yesBtn.style.padding = `${0.8 + (noClickCount * 0.1)}em ${2 + (noClickCount * 0.2)}em`;
            
            noBtn.innerText = noPhrases[Math.min(noClickCount, noPhrases.length - 1)];
            noClickCount++;

            if (noClickCount > 5) {
                questionHead.innerText = "Don't break my heart! 💔";
            }
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents the actual click/tap from occurring
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            step1.style.display = 'none';
            step2.style.display = 'block';
            bgMusic.play();
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d63384', '#ff69b4', '#ffc0cb']
            });
        });

        finalizeBtn.addEventListener('click', () => {
            step2.style.display = 'none';
            successMsg.style.display = 'block';
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#d63384', '#4caf50', '#ff69b4']
            });
        });
    </script>
</body>
</html>
